name: sequential-thinking
kind: global
transport: stdio-bridge
command: npx
base_args:
  - "-y"
  - "@modelcontextprotocol/server-sequential-thinking"

daemons:
  - name: default
    port: 9124

client_bindings:
  - client: claude-code
    daemon: default
    url_path: /mcp
  - client: codex-cli
    daemon: default
    url_path: /mcp
  - client: gemini-cli
    daemon: default
    url_path: /mcp
  - client: antigravity
    daemon: default
    url_path: /mcp

weekly_refresh: false
