name: serena
kind: global
transport: native-http
command: uvx
base_args:
  - --from
  - git+https://github.com/oraios/serena@f0a3a279b7c48d28b9e7e4aea1ed9caed846906b
  - serena
  - start-mcp-server
  - --transport
  - streamable-http
env: {}

# Two daemons, two Serena contexts:
#   - claude (9121, context=claude-code) is shared by Claude Code and Gemini CLI.
#     Both accept the claude-code context's tool preset. Sharing reduces Serena
#     instance count and lets the gopls LSP cache serve both client sessions.
#   - codex (9122, context=codex) is separate because Codex CLI requires its
#     own Serena context's tool preset.
daemons:
  - name: claude
    context: claude-code
    port: 9121
    extra_args: [--context, claude-code]
  - name: codex
    context: codex
    port: 9122
    extra_args: [--context, codex]

## Antigravity's Cascade agent (Antigravity IDE v0.x as of 2026-04-17)
# silently drops loopback-HTTP MCP entries regardless of schema. Its HTTP
# support works only for remote HTTPS endpoints. Workaround: write a stdio
# entry to ~/.gemini/antigravity/mcp_config.json that spawns `mcphub.exe relay`
# as its child process. The relay connects to the shared HTTP daemon on 9121
# and forwards JSON-RPC between Antigravity's stdin/stdout and the daemon.
# This restores shared-daemon benefits for multi-window Antigravity users
# without requiring Cascade to add loopback-HTTP support.
#
# See internal/clients/antigravity.go + internal/daemon/relay.go.
client_bindings:
  - client: claude-code
    daemon: claude
    url_path: /mcp
  - client: codex-cli
    daemon: codex
    url_path: /mcp
  - client: antigravity
    daemon: claude
    url_path: /mcp
  - client: gemini-cli
    daemon: claude
    url_path: /mcp

weekly_refresh: false
