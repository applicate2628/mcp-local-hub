name: serena
kind: global
transport: native-http
command: uvx
base_args:
  - --refresh
  - --from
  - git+https://github.com/oraios/serena
  - serena
  - start-mcp-server
  - --transport
  - streamable-http
env: {}

# Two daemons, two Serena contexts:
#   - claude (9121, context=claude-code) is shared by Claude Code, Gemini CLI, and Antigravity.
#     All three accept the claude-code context's tool preset. Sharing reduces Serena instance
#     count from 3 → 1 and lets the gopls LSP cache serve three client sessions simultaneously.
#   - codex (9122, context=codex) is separate because Codex CLI requires Codex-specific tool
#     presets; two contexts in one daemon is not supported by Serena.
daemons:
  - name: claude
    context: claude-code
    port: 9121
    extra_args: [--context, claude-code]
  - name: codex
    context: codex
    port: 9122
    extra_args: [--context, codex]

client_bindings:
  - client: claude-code
    daemon: claude
    url_path: /mcp
  - client: codex-cli
    daemon: codex
    url_path: /mcp
  - client: antigravity
    daemon: claude
    url_path: /mcp
  - client: gemini-cli
    daemon: claude
    url_path: /mcp

weekly_refresh: true
