name: wolfram
kind: global
transport: stdio-bridge
# wolframalpha-llm-mcp is a third-party Node-based server. Clone it into
# ${HOME}/.local/mcp-servers/wolframalpha-llm-mcp and build with
# `npm install && npm run build` before installing this manifest.
command: node
base_args:
  - "${HOME}/.local/mcp-servers/wolframalpha-llm-mcp/build/index.js"
env:
  WOLFRAM_LLM_APP_ID: "secret:wolfram_app_id"

daemons:
  - name: default
    port: 9132

client_bindings:
  - client: claude-code
    daemon: default
    url_path: /mcp
  - client: codex-cli
    daemon: default
    url_path: /mcp
  - client: gemini-cli
    daemon: default
    url_path: /mcp
  - client: antigravity
    daemon: default
    url_path: /mcp

weekly_refresh: false
