name: memory
kind: global
transport: stdio-bridge
command: npx
base_args:
  - "-y"
  - "@modelcontextprotocol/server-memory"
# MEMORY_FILE_PATH defaults to a per-user location under the home dir.
# Override at install time by exporting the env var (or by editing this
# manifest before install) if you keep memory data elsewhere.
env:
  MEMORY_FILE_PATH: "${HOME}/.local/share/mcp-memory/memory.jsonl"

daemons:
  - name: default
    port: 9123

client_bindings:
  - client: claude-code
    daemon: default
    url_path: /mcp
  - client: codex-cli
    daemon: default
    url_path: /mcp
  - client: gemini-cli
    daemon: default
    url_path: /mcp
  - client: antigravity
    daemon: default
    url_path: /mcp

weekly_refresh: false
