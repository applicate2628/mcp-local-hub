name: gdb
kind: global
transport: stdio-bridge
# GDB-MCP is a third-party Python MCP server. Clone it into
# ${HOME}/.local/mcp-servers/GDB-MCP (or set GDB_MCP_DIR to the install
# location) before installing this manifest.
command: uv
base_args:
  - "run"
  - "--directory"
  - "${HOME}/.local/mcp-servers/GDB-MCP"
  - "python"
  - "server.py"

# GDB-MCP is a multi-debugger MCP server (gdb + lldb submodules) with built-in
# session management (modules/gdb/sessionManager.py + modules/lldb/sessionManager.py).
# Each client call includes a session_id; one daemon serves N concurrent debug
# sessions. This is why it belongs on the hub instead of in perSessionServers.

daemons:
  - name: default
    port: 9129

client_bindings:
  - client: claude-code
    daemon: default
    url_path: /mcp
  - client: codex-cli
    daemon: default
    url_path: /mcp
  - client: gemini-cli
    daemon: default
    url_path: /mcp
  - client: antigravity
    daemon: default
    url_path: /mcp

weekly_refresh: false
